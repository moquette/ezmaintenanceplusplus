name: CI

# EZ Maintenance++ is the single source of truth for this add-on (source, tests,
# build/release tooling). This workflow runs the enforcement suite on every push so the
# guards actually fire in CI, not only when someone remembers to run pytest locally -
# which was the exact gap that let regressions ship before the tests existed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Run the full test suite
        run: python3 -m pytest tests/ -q

      # The full suite above already runs these. This named re-run exists so a broken
      # tvOS storage guard fails as its OWN loudly-named check, not a needle in the log:
      #  - the chokepoint lint (no raw userdata write bypassing nsud)
      #  - the sandbox-IO contract (ControlImage write-through / VFS foreign-local-read)
      - name: tvOS storage guards (chokepoint / sandbox IO)
        run: >
          python3 -m pytest -q
          tests/test_no_raw_userdata_writer.py
          tests/test_tvos_sandbox_io_contract.py

      # Scoped to tests/ + tools/ deliberately: the add-on source under
      # script.ezmaintenanceplusplus/ carries pre-existing ruff findings inherited from
      # the upstream fork (bare excepts, etc.) that predate this repo. Linting it here
      # would fail CI on legacy code untouched by any change; that cleanup is a separate,
      # behavior-preserving task, not a CI gate. tests/test_addon_source_lint_debt.py is
      # the tracked, visible marker for that debt (xfail, never a silent skip).
      - name: Lint (tests + tooling)
        run: ruff check tests/ tools/

      # GAP 2 (2026-07-14): queries this repo's own GitHub Releases and only fails on a
      # REGRESSION (addon.xml behind the latest published release) or a CONTRADICTION (a
      # release tag matching addon.xml exists with a missing/mismatched asset) - never
      # merely because addon.xml is ahead of the latest release, which is the normal,
      # legitimate state between "bump addon.xml + push" and running tools/release.sh
      # (see that script's header and tools/check_release_consistency.py's docstring for
      # why a naive gate here would be mis-designed). A network failure degrades to a
      # warning, not a gate failure - see that module's "NETWORK POSTURE" section.
      - name: Release existence gate (regression / contradiction only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/check_release_consistency.py

      # Determinism + packagability: the release zip must build headlessly and byte-stably
      # (sorted members, fixed timestamps). Guards against a change that breaks the build.
      - name: Build smoke (deterministic zip)
        run: python3 tools/build.py

  # Publishing is CI's job, not a hand-run script. This publishes the GitHub Release
  # asset automatically once `test` is green on main.
  #
  # NOTE (2026-07-21): this used to claim auto-publish "can never ship an unverified
  # storage change", because `test` included a hardware-verification gate that required
  # a committed verification/<version>.json pulled live from a real Fire TV and Apple TV.
  # THAT GATE IS DELETED. Publishing is now gated on a green suite and nothing else.
  # That is deliberate: the gate was expensive enough that it got routed around by hand
  # (two versions shipped past it in one day), and a control people bypass is worse than
  # no control because everyone believes it is holding. Do not restore it without
  # deciding first what makes it cheap enough to actually satisfy.
  #
  # Idempotent: if the tag for addon.xml's current version already exists, this is a
  # no-op (a re-push of the same version publishes nothing). A release therefore happens
  # exactly once per version bump, with no human running tools/release.sh. That script
  # is retained only for a manual/offline re-cut; the normal path is this job.
  publish:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the deterministic release zip
        run: python3 tools/build.py

      - name: Publish the GitHub Release asset (once per version) + verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ADDON=script.ezmaintenanceplusplus
          REPO="${GITHUB_REPOSITORY}"
          VERSION=$(grep '<addon ' "$ADDON/addon.xml" | grep -oE 'version="[^"]+"' | head -1 | sed 's/version="//; s/"//')
          ZIP="dist/${ADDON}-${VERSION}.zip"
          TAG="v${VERSION}"
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/${ADDON}-${VERSION}.zip"
          echo "version=${VERSION} tag=${TAG} sha256=${SHA256}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release ${TAG} already exists - nothing to publish (idempotent no-op)."
            exit 0
          fi

          # --target main: the tag resolves against the pushed branch, never local work.
          gh release create "$TAG" "$ZIP" \
            --repo "$REPO" \
            --target "${GITHUB_SHA}" \
            --title "EZ Maintenance++ ${VERSION}" \
            --notes "sha256: ${SHA256}"

          echo "verifying the asset is anonymously downloadable and byte-correct..."
          TMP=$(mktemp).zip
          curl -sSfL "$ASSET_URL" -o "$TMP"
          DOWNLOADED_SHA=$(shasum -a 256 "$TMP" | awk '{print $1}')
          rm -f "$TMP"
          if [ "$DOWNLOADED_SHA" != "$SHA256" ]; then
            echo "FATAL: published asset sha256 mismatch (expected ${SHA256}, got ${DOWNLOADED_SHA})" >&2
            exit 1
          fi
          echo "OK - ${ASSET_URL} sha256-verified against the CI build"
          echo "published=1" >> "$GITHUB_OUTPUT"
        id: pub

      # A release created with GITHUB_TOKEN does NOT emit a `release: published`
      # event (GitHub suppresses it to prevent recursive runs), so notify-hub.yml
      # will not auto-fire for a CI-published release. Dispatch the hub catalog
      # rebuild directly here so the fleet sees the new build within minutes, not
      # the daily-cron's up-to-24h. Only when this run actually published (skipped
      # on the idempotent no-op). Benign on failure: the hub cron still catches it.
      - name: Dispatch hub catalog rebuild
        if: steps.pub.outputs.published == '1'
        continue-on-error: true # benign: the hub's daily cron catches the release within 24h
        env:
          GH_TOKEN: ${{ secrets.T7B_DISPATCH_TOKEN }}
        run: >
          gh api repos/tony7bones/tony7bones.github.io/dispatches
          -f event_type=ezmpp-release
