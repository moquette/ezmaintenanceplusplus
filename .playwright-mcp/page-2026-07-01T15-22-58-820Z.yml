        - table [ref=f16e457]:
          - rowgroup [ref=f16e458]:
            - row "Example" [ref=f16e459]:
              - columnheader "Example" [ref=f16e460]
              - columnheader [ref=f16e461]
            - 'row "Example 1: <advancedsettings version=\"1.0\"> <loglevel>2</loglevel> </advancedsettings>" [ref=f16e462]':
              - rowheader "Example 1:" [ref=f16e463]
              - cell "<advancedsettings version=\"1.0\"> <loglevel>2</loglevel> </advancedsettings>" [ref=f16e464]:
                - generic [ref=f16e465]: <advancedsettings version="1.0"> <loglevel>2</loglevel> </advancedsettings>
            - 'row "Example 2: <advancedsettings version=\"1.0\"> <loglevel hide=\"true\">2</loglevel> </advancedsettings>" [ref=f16e466]':
              - rowheader "Example 2:" [ref=f16e467]
              - cell "<advancedsettings version=\"1.0\"> <loglevel hide=\"true\">2</loglevel> </advancedsettings>" [ref=f16e468]:
