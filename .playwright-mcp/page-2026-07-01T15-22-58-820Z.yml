        - heading "jsonrpc" [level=3] [ref=f16e479]
        - paragraph [ref=f16e480]:
          - text: To make it easier for developers using the
          - link "JSON-RPC_API" [ref=f16e481] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/JSON-RPC_API
          - text: API in their (third party) applications to debug during development the json output of Kodi can be prettified by setting compactoutput to false. Default json output mode is a compact print which does not contain any unnecessary whitespaces and therefore is difficult to read for humans. Furthermore using the tcpport setting it is possible to change the default TCP port used by Kodi for JSON RPC (which is 9090) to any other valid port.
        - paragraph [ref=f16e482]: "Example:"
        - generic [ref=f16e483]: <jsonrpc> <compactoutput>false</compactoutput> <tcpport>9999</tcpport> </jsonrpc>
        - heading "Audio/video playback settings" [level=2] [ref=f16e484]: Audio/video playback settings
        - heading "skiploopfilter" [level=3] [ref=f16e485]
        - paragraph [ref=f16e486]: The amount of the loop filter to skip on h.264 decoding. This can help the performance of slower machines when decoding h264 content. Values, in decreasing CPU usage (and decreasing quality)
        - list [ref=f16e487]:
          - listitem [ref=f16e488]: "-16 None"
          - listitem [ref=f16e489]: 0 Skip only empty frames (default)
          - listitem [ref=f16e490]: 8 Skip non-reference frames
          - listitem [ref=f16e491]: 16 Skip bi-dir frames
          - listitem [ref=f16e492]: 32 Skip all non-key frames
          - listitem [ref=f16e493]: 48 Skip all frames
        - paragraph [ref=f16e494]: "Example:"
        - generic [ref=f16e495]: <skiploopfilter>8</skiploopfilter>
