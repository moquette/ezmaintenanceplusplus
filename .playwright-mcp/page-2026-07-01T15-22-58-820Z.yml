        - heading "audio" [level=3] [ref=f16e716]
        - paragraph
        - generic [ref=f16e717]: "<audio> <!-- Amount of headroom Kodi should use above the maximum volume level, in decibels. Defaults to 0, valid values 0, 6, 12. --> <headroom>0</headroom> <!-- Default audio player: paplayer or videoplayer --> <defaultplayer>paplayer</defaultplayer> <!-- Regular expressions that if evaluated to true won't be added to library. --> <excludefromscan> <regexp>[-\\._ ](podcast)[-\\._ ]</regexp> </excludefromscan> <!-- Regular expressions that if evaluated to true won't be displayed in Files View --> <excludefromlisting> <regexp>[-\\._ ](podcast)[-\\._ ]</regexp> </excludefromlisting> <!-- Amount of gain (dB) to be applied to AC3 streams that have been mixed-down to 2 channels. Default is 12.0. Valid values are: -96.0 to 96.0. --> <ac3downmixgain>12.0</ac3downmixgain> <!-- Whether to use time based or percentage based seeking. --> <usetimeseeking>true</usetimeseeking> <!-- Time to seek forward in seconds when doing a long seek. Defaults to 600 (10 minutes) and -600 (-10 minutes) respectively. --> <timeseekforwardbig>600</timeseekfowardbig> <!-- Time to seek backward in seconds when doing a long seek back. Defaults to 600 (10 minutes) and -600 (-10 minutes) respectively. --> <timeseekbackwardbig>-600</timeseekbackward> <!-- Minimum percentage that has to be played before it is considered for incrementing in the Top 100 database view, or for last.fm submittal --> <playcountminimumpercent>99</playcountminimumpercent> <!-- Whether to use Dynamic Range Compression (DRC) on AC3 streams. 1.0 is \"full\" compression, as defined by the audio track's metadata, which is recommended for \"basic\" sound systems such as the internal speakers on a TV. 0.0 is no compression at all, which is recommended for people with nice multi-speaker sound systems. -1.0 (default) defaults to whatever ffmpeg uses, which is currently the same as 1.0. This has no effect if passthrough is enabled for AC3. --> <applydrc>-1.0</applydrc> <!-- default values for limiter/compressor --> <limiterhold>0.025</limiterhold> <!-- default values for limiter/compressor --> <limiterrelease>0.1</limiterrelease> <!-- This setting is only relevant for Passthrough in the context of resyncing, e.g.; when there is no resampling possible. This value decides after which amount of discontinuity in milliseconds VideoPlayer will ErrorAdjust the Clock. On platforms like Android where the sink delay is just a non exact interpolation, a too small value might cause rare image stutter. The maximum value is 100 ms. A higher value makes no sense cause of A/V issues. This is a last-resort workaround as the root-cause cannot be mitigated 100% [Available from Kodi v20] --> <maxpassthroughoffsyncduration>10</maxpassthroughoffsyncduration> </audio>"
        - heading "forcedswaptime" [level=3] [ref=f16e718]
        - paragraph [ref=f16e719]: Use to force a backbuffer->frontbuffer swap while vsync is enabled. Set to the time (in ms) to allow for the swap (e.g. <forcedswaptime>1</forcedswaptime> is typical).
        - paragraph [ref=f16e720]: "Default: Off"
        - paragraph [ref=f16e721]
        - heading "edl" [level=3] [ref=f16e722]
        - paragraph
        - generic [ref=f16e724]:
