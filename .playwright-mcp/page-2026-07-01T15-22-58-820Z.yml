        - heading "Music settings" [level=2] [ref=f16e1094]
        - heading "musicextensions" [level=3] [ref=f16e1095]
        - paragraph
        - paragraph [ref=f16e1096]: "Default extensions for MUSIC:"
        - generic [ref=f16e1097]: .nsv .m4a .flac .aac .strm .pls .rm .rma .mpa .wav .wma .ogg .mp3 .mp2 .m3u .gdm .imf .m15 .sfx .uni .ac3 .dts .cue .aif .aiff .wpl .xspf .ape .mac .mpc .mp+ .mpp .shn .zip .wv .dsp .xsp .xwav .waa .wvs .wam .gcm .idsp .mpdsp .mss .spt .rsd .sap .cmc .cmr .dmc .mpt .mpd .rmt .tmc .tm8 .tm2 .oga .url .pxml .tta .rss .wtv .mka .tak .opus .dff .dsf .m4b .dtshd
        - paragraph [ref=f16e1098]: It is possible to add or remove extensions for Music, using the following XML tags. Useful if you keep, say, FLAC and mp3 versions of music in the same folder. The <remove> tag can be used to remove mp3 from being listed in the library, leaving only the higher quality FLAC being displayed.
        - generic [ref=f16e1099]: <musicextensions> <add>.ex1|.ex2</add> <remove>.ex3|.ex4</remove> </musicextensions>
        - paragraph [ref=f16e1100]
        - heading "cddbaddress" [level=3] [ref=f16e1101]
        - paragraph [ref=f16e1102]: The address of the online CDDb database. You may set this to another freedb mirror if there is a more suitable one.
        - paragraph [ref=f16e1103]: "Default:"
        - generic [ref=f16e1104]: <cddbaddress>freedb.freedb.org</cddbaddress>
        - heading "songinfoduration" [level=3] [ref=f16e1105]
        - paragraph [ref=f16e1106]: This controls how long the song information will remain onscreen when the song changes during visualisations. The valid range is "1" to "Indefinite (0)", in seconds. This does not include the duration of any transition effects.
        - paragraph [ref=f16e1107]: "Default:"
        - generic [ref=f16e1108]: <songinfoduration>10</songinfoduration>
        - heading "musicfilenamefilters" [level=3] [ref=f16e1109]
        - paragraph [ref=f16e1110]: "Contains filters to match music information (artist, title etc.) from a tag-less music filename. The first <filter> to match completely is used. Matched items include:"
        - generic [ref=f16e1111]: "%A - Artist %T - Title %B - Album %N - Track number %S - Part of set (disk number) %D - Duration %G - Genre %Y - Year %R - Rating"
        - paragraph [ref=f16e1112]: "Example:"
        - generic [ref=f16e1113]: <musicfilenamefilters> <filter>%A - %T</filter> </musicfilenamefilters>
        - heading "musiclibrary" [level=3] [ref=f16e1114]
        - paragraph [ref=f16e1115]: Options specific to the Music Library
        - generic [ref=f16e1116]: <musiclibrary> <allitemsonbottom>true</allitemsonbottom> <!-- sorts the "*All" items at the bottom of the list when in Ascending order --> <cleanonupdate>false</cleanonupdate> <!-- default set to false to prevent Kodi from removing items from the database while updating. --> <recentlyaddeditems>35</recentlyaddeditems> <!-- number of recently added items. Defaults to 25 --> <albumformat>%B - %Y</albumformat> <!-- album label template, default is "%B" --> <prioritiseapetags>true</prioritiseapetags> <!-- prioritise APEv2 tags over ID3v1/2 tags, default is false. --> <itemseparator> / </itemseparator> <!-- separator used for multiple artists/genres in tags. Note, this is *space* *slash* *space* See Note below--> <artistseparators> <!-- separator used for multiple artists. Note that spaces are used for some separators. See Note below--> <separator>;</separator> <separator>:</separator> <separator>|</separator> <separator> feat. </separator> <separator> ft. </separator> </artistseparators> <dateadded>1</dateadded> <!--0 results in using the current datetime when adding a song; 1 (default) results in prefering to use the files mtime (if it's valid) and only using the file's ctime if the mtime isn't valid; 2 results in using the newer datetime of the file's mtime and ctime --> <!-- New for v19 and later releases --> <useisodates>false</useisodates> <!-- When "true" all dates displayed in the music library will be in ISO 8601 format (YYYY-MM-DD or part thereof). Defaults to "false" (use localized dates) --> </musiclibrary>
        - paragraph [ref=f16e1117]:
          - generic [ref=f16e1118]: "Note: Changing the <itemseparator> or <artistseparators> will only affect newly added items. A rescan won't change the existing ones. Remove the Source(s) or delete the Music DB and rebuild. This process should be made easier from v18 and up using <promptfulltagscan>"
        - heading "Photos settings" [level=2] [ref=f16e1119]
        - heading "pictureextensions" [level=3] [ref=f16e1120]
        - paragraph [ref=f16e1121]: A list of additional file-extensions to allow (add) or exclude (remove) in the My Pictures window.
        - paragraph [ref=f16e1122]: "Default extensions for PICTURES:"
        - generic [ref=f16e1123]: .png .jpg .jpeg .bmp .gif .ico .tif .tiff .tga .pcx .cbz .zip .rss .webp .jp2 .apng
        - paragraph [ref=f16e1124]: "Examples:"
        - generic [ref=f16e1125]: <pictureextensions> <add>.ex1|.ex2</add> <remove>.ex3|.ex4</remove> </pictureextensions>
        - heading "pictureexcludes" [level=3] [ref=f16e1126]
        - paragraph [ref=f16e1127]: Matches filenames or folders which should be excluded from being displayed in My Pictures using a list of Regular Expressions
        - generic [ref=f16e1128]: <pictureexcludes> <!-- Regular expressions that if evaluated to true won't be displayed in My Pictures --> <regexp>small</regexp> <regexp>[-\._ ](sample|trailer)[-\._ ]</regexp> </pictureexcludes>
        - heading "slideshow" [level=3] [ref=f16e1129]
        - paragraph
        - generic [ref=f16e1130]: <slideshow> <!-- Amount to pan images as a percentage of the screen --> <panamount>2.5</panamount> <!-- Amount to zoom images as a percentage of the screen --> <zoomamount>5.0</zoomamount> <!-- Amount to compensate (zoom) images to attempt to reduce black bars. --> <!-- Results in cropping of the longer length of the image in order to reduce the black bars on the shorter length of the image. --> <!-- Defaults to 20. --> <blackbarcompensation>20</blackbarcompensation> </slideshow>
        - heading "Network settings" [level=2] [ref=f16e1131]
        - heading "ftp" [level=3] [ref=f16e1132]
        - paragraph [ref=f16e1133]: Specific settings if a ftp server is in use as a source
        - generic [ref=f16e1134]: <ftp> <remotethumbs>true</remotethumbs> <!-- enable extraction of flag and thumb for ftp --> </ftp>
        - heading "samba" [level=3] [ref=f16e1135]
        - paragraph
        - generic [ref=f16e1136]: <samba> <doscodepage></doscodepage> <!-- code page to use for filenames --> <clienttimeout>10</clienttimeout> <!-- timeout (in seconds) --> <statfiles>true</statfiles> <!-- Set to false to disable smb stat() on files to speed up listings of large directories (over slow links) --> </samba>
        - heading "hosts" [level=3] [ref=f16e1137]
        - paragraph [ref=f16e1138]: Static dns entries which take precedence over your dns server.
        - generic [ref=f16e1139]: <hosts> <entry name="HOSTNAME">IPADDRESS</entry> </hosts>
        - heading "network" [level=3] [ref=f16e1140]
        - paragraph
        - generic [ref=f16e1141]: "<network> <curlclienttimeout>10</curlclienttimeout> <!-- Timeout in seconds for libcurl (http/ftp) connections --> <curllowspeedtime>20</curllowspeedtime> <!-- Time in seconds for libcurl to consider a connection lowspeed --> <curlretries>2</curlretries> <!-- Amount of retries for certain failed libcurl operations (e.g. timeout) --> <httpproxyusername></httpproxyusername> <!-- username for Basic Proxy Authentication --> <httpproxypassword></httpproxypassword> <!-- password for Basic Proxy Authentication --> <disableipv6>false</disableipv6> <!-- Certain hardware/OS combinations have trouble with ipv6. Set \"true\" to disable --> <disablehttp2>false</disablehttp2> <!-- Added in v19- Allows disabling HTTP2 for broken Curl / HTTP2 servers --> <nfstimeout>30</nfstimeout> <!-- Added in v19- Timeout in seconds for NFS access, 0 = wait forever (previous behaviour) default is 5s --> <catrustfile>filepath</catrustfile> <!-- Added in v19- Allows specifying a custom SSL CA trust store bundle. e.g. special://masterprofile/cacerts.pem --> <curlkeepaliveinterval>30</curlkeepaliveinterval> <!-- Added in v19- Enable TCP keepalive probes in curl --> <nfsretries>0</nfsretries> <!-- 0 to disable, default: -1 (unlimited) Added in v20--> </network>"
        - paragraph [ref=f16e1142]: "More information:"
        - list [ref=f16e1143]:
          - listitem [ref=f16e1144]:
            - text: <curlkeepaliveinterval>
            - superscript [ref=f16e1145]:
              - link "[8]" [ref=f16e1146] [cursor=pointer]:
                - /url: "#cite_note-8"
          - listitem [ref=f16e1147]:
            - text: <nfsretries>
            - superscript [ref=f16e1148]:
              - link "[9]" [ref=f16e1149] [cursor=pointer]:
                - /url: "#cite_note-9"
        - heading "cache" [level=3] [ref=f16e1150]
        - generic [ref=f16e1151]:
          - text: "See also:"
          - link "HOW-TO:Modify_the_video_cache" [ref=f16e1153] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/HOW-TO:Modify_the_video_cache
        - generic [ref=f16e1154]: "<cache> <memorysize>0</memorysize> <!-- Number of bytes used for buffering streams in memory when set to 0 the cache will be written to disk instead of RAM --> <buffermode>0</buffermode> <!-- Choose what to buffer: 0) Buffer all internet filesystems (like \"2\" but additionally also ftp, webdav, etc.) 1) Buffer all filesystems (including local) (default since Kodi 19) 2) Only buffer true internet filesystems (streams) (http, https, etc.) 3) No buffer 4) Buffer all network filesystems (incl. smb, nfs, etc.) --> <readfactor>4.0</readfactor> <!-- This factor determines the max readrate in terms of readfactor * avg bitrate of a video file. This can help on bad connections to keep the cache filled. It will also greatly speed up buffering. Default value 4.0. --> <chunksize>65536</chunksize> <!-- Filesystem like e.g. NFS might not properly receive the server's max read chunk values and therefore end up with a very low default, causing issues during Cache filling and buffering. This values can be tuned between 256 Bytes and 1048576 Bytes. Depending on the filesystem this value is overwritten by e.g. FileCache implementation when another default is appropriate --> </cache>"
        - heading "airtunesport" [level=3] [ref=f16e1155]
        - paragraph [ref=f16e1156]: This overwrites the defalt listening port of the AirTunes server (announced via zeroconf).
        - paragraph [ref=f16e1157]
        - heading "airplayport" [level=3] [ref=f16e1158]
        - paragraph [ref=f16e1159]: This overwrites the default listening port of the AirPlay server (announced via zeroconf).
        - paragraph [ref=f16e1160]
        - heading "File system settings" [level=2] [ref=f16e1161]
        - heading "packagefoldersize" [level=3] [ref=f16e1162]
        - paragraph [ref=f16e1163]: <packagefoldersize>options</packagefoldersize>
        - paragraph [ref=f16e1164]:
          - text: The amount (in megabytes) of add-on zip packages saved from previous add-on installs. These packages are mainly used for the
          - link "add-on" [ref=f16e1165] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Add-ons
          - text: rollback feature. Increasing the size should increase the amount of past versions saved. Defaults to 200 MB.
        - paragraph [ref=f16e1166]: "Example:"
        - generic [ref=f16e1167]: <packagefoldersize>200</packagefoldersize> <!-- this example would keep up to 200MB of add-on packages. -->
        - paragraph [ref=f16e1168]
        - heading "detectasudf" [level=3] [ref=f16e1169]
        - paragraph [ref=f16e1170]: <detectasudf>options</detectasudf>
        - paragraph [ref=f16e1171]: Set to true if you wish to detect joint ISO9660/UDF disks as UDF.
        - paragraph [ref=f16e1172]: "Main options:"
        - paragraph [ref=f16e1173]:
          - text: true, false
          - text: "Example:"
        - generic [ref=f16e1174]: <detectasudf>false</detectasudf>
        - paragraph [ref=f16e1175]
        - heading "handlemounting" [level=3] [ref=f16e1176]
        - paragraph [ref=f16e1177]: <handlemounting>options</handlemounting>
        - paragraph [ref=f16e1178]:
          - text: Only used in Linux, it defines if Kodi should attempt to mount media drives (via udisks or udisks2).
          - text: "Default: False. If kodi is executed with the --standalone option (e.g. as done by kodi-standalone.sh) it by default will be True."
        - paragraph [ref=f16e1179]: "Main options:"
        - paragraph [ref=f16e1180]:
          - text: true, false
          - text: "Example:"
        - generic [ref=f16e1181]: <handlemounting>false</handlemounting>
        - paragraph [ref=f16e1182]
        - heading "automountopticalmedia" [level=3] [ref=f16e1183]
        - paragraph [ref=f16e1184]: <automountopticalmedia>options</automountopticalmedia>
        - paragraph [ref=f16e1185]:
          - text: Only used in linux for the udisks and udisks2 providers
          - text: defines if kodi should automount optical discs
          - superscript [ref=f16e1186]:
            - link "[10]" [ref=f16e1187] [cursor=pointer]:
              - /url: "#cite_note-10"
        - paragraph [ref=f16e1188]: "Main options:"
        - paragraph [ref=f16e1189]:
          - text: true, false
          - text: "Example:"
        - generic [ref=f16e1190]: <automountopticalmedia>true</automountopticalmedia>
        - paragraph [ref=f16e1191]
        - heading "pathsubstitution" [level=3] [ref=f16e1192]
        - paragraph
        - generic [ref=f16e1194]:
          - text: "Main page:"
          - link "Path substitution" [ref=f16e1196] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Path_substitution
        - generic [ref=f16e1197]: "Note: Path substition for \"sources\" and profiles is broken, and will NOT be fixed."
        - paragraph [ref=f16e1198]: Path substitutions are for use for redirecting file paths. These are processed in order, and are useful for substituting an absolute path on a PC with a path suitable for Kodi to handle.
        - paragraph [ref=f16e1199]: "Default: No path substitutions defined."
        - paragraph [ref=f16e1200]: "Example:"
        - generic [ref=f16e1201]: <pathsubstitution> <substitute> <from>G:\dvds\</from> <to>smb://somecomputer/g-share/dvds/</to> <!-- Note the difference between the usage of forward and backslashes --> </substitute> </pathsubstitution>
        - paragraph [ref=f16e1202]
        - heading "Input control settings" [level=2] [ref=f16e1203]
        - heading "remotedelay" [level=3] [ref=f16e1204]
        - paragraph [ref=f16e1205]: The repeat delay for a LIRC remote control. A delay value between 1 and 20 before a remote button starts repeating on a long keypress (i.e. continuously sending button pushes while it's held down).
        - paragraph [ref=f16e1206]: "Default: 3"
        - generic [ref=f16e1207]: <remotedelay>10</remotedelay>
        - paragraph [ref=f16e1208]
        - heading "controllerdeadzone" [level=3] [ref=f16e1209]
        - paragraph [ref=f16e1210]:
          - text: This advanced settings has been removed. Since v17, the
          - link "<controllerdeadzone>" [ref=f16e1211] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#controllerdeadzone
          - text: advanced setting has been removed. Deadzones can now be configured by plugging in the controller and selecting it in Settings -> System settings -> Input -> Peripherals.
        - paragraph [ref=f16e1212]
        - heading "enablemultimediakeys" [level=3] [ref=f16e1213]
        - paragraph [ref=f16e1214]: This setting only has any effect on Windows versions of Kodi, and only applies to builds from 28th May 2011 onwards. In Windows the multimedia keys generate a WM_APPCOMMAND message in addition the keypress. Kodi processes both keypresses and the WM_APPCOMMAND messages, and the end result would be that the command is executed twice. To avoid this, by default multimedia keypresses are disabled. Although it should rarely be necessary, the enablemultimediakeys setting allows you to enable the multimedia keys.
        - paragraph [ref=f16e1215]: "Example:"
        - generic [ref=f16e1216]: <enablemultimediakeys>true</enablemultimediakeys>
        - paragraph [ref=f16e1217]
        - heading "seeksteps" [level=3] [ref=f16e1218]
        - generic [ref=f16e1220]:
          - text: "Main page:"
          - link "Skip steps" [ref=f16e1222] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Skip_steps
        - paragraph [ref=f16e1223]:
          - text: This setting changes which increments are available in the settings GUI for additive seeking. Note that
          - code [ref=f16e1224]: <seeksteps>
          - text: is not used to actually choose which seek steps are enabled.
        - paragraph [ref=f16e1225]: "Default:"
        - generic [ref=f16e1226]: <seeksteps>7, 15, 30, 60, 180, 300, 600, 900, 1800</seeksteps>
        - paragraph [ref=f16e1227]:
          - generic [ref=f16e1230]:
            - generic [ref=f16e1232]:
              - link "Editor note" [ref=f16e1233] [cursor=pointer]:
                - /url: /web/20240101191552/https://kodi.wiki/view/Template:Editor_note
              - text: ":"
            - text: the defaults need to be updated for seeksteps.
        - paragraph [ref=f16e1234]
        - heading "touchscreen" [level=3] [ref=f16e1235]
        - paragraph [ref=f16e1236]: This setting allows you to move/align the origin of the touch screen with the origin of the display used. If touch input does not result in a correct movement of the mouse pointer, the behaviour can be corrected with an offset and a stretch/compress factor.
        - paragraph [ref=f16e1237]: "Example:"
        - generic [ref=f16e1238]: <touchscreen> <x_offset>0</x_offset> <!-- set pixel x offset to align it to the used display--> <y_offset>0</y_offset> <!-- set pixel y offset to align it to the used display--> <x_stretch_factor>1.0</x_stretch_factor> <!-- stretch/compress the touch x axis--> <y_stretch_factor>1.0</y_stretch_factor> <!-- stretch/compress the touch y axis--> </touchscreen>
        - paragraph [ref=f16e1239]
        - heading "scanirserver" [level=3] [ref=f16e1240]
        - paragraph [ref=f16e1241]:
          - text: Introduced in v18 and used in MS Windows setups only.
          - superscript [ref=f16e1242]:
            - link "[11]" [ref=f16e1243] [cursor=pointer]:
              - /url: "#cite_note-11"
          - text: Used to disable the regular connection attempts to the IR Server Suite when there is no remote to connect to.
        - paragraph [ref=f16e1244]: The default setting is to allow connection attempts. To disable connection attempts change value to false.
        - generic [ref=f16e1245]: <scanirserver>true</scanirserver>
        - paragraph [ref=f16e1246]
        - heading "Other interface settings" [level=2] [ref=f16e1247]
        - heading "window" [level=3] [ref=f16e1248]
        - paragraph [ref=f16e1249]:
          - generic [ref=f16e1250]: "Note: This is a \"hidden\" guisettings.xml setting (defined by the mouse moving the window size), but it is mentioned here because it is a particularly useful override when used in advancedsettings.xml"
          - text: This allows you to manually set the default size of Kodi's windowed mode. If you resize the window, it will return to the set size when restarting.
        - paragraph [ref=f16e1251]: WIDTH and HEIGHT are the values for each dimension, in pixels.
        - generic [ref=f16e1252]: <window> <width>WIDTH</width> <height>HEIGHT</height> </window>
        - paragraph [ref=f16e1253]
        - heading "restrictcapsmask" [level=3] [ref=f16e1254]
        - paragraph [ref=f16e1255]: Windows only. A bitmask to prevent Kodi from using detected texture capabilities of the GPU. This helps work around buggy hardware/drivers.
        - paragraph [ref=f16e1256]: "1: prevent the use of compressed textures (DXT1, DXT3, DXT5) 2: prevent the use of non-power-of-two dimensions for textures 4: prevent the use of compressed textures with non-power-of-two dimensions."
        - generic [ref=f16e1257]: <restrictcapsmask>0</restrictcapsmask>
        - paragraph [ref=f16e1258]
        - heading "algorithmdirtyregions" [level=3] [ref=f16e1259]
        - paragraph
        - generic [ref=f16e1260]:
          - text: "See also:"
          - link "HOW-TO:Modify dirty regions" [ref=f16e1262] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/HOW-TO:Modify_dirty_regions
        - paragraph [ref=f16e1263]:
          - generic [ref=f16e1264]:
            - text: "Note: Some GPU/hardware configurations will have some minor issues (such as a visual \"flicker\"). For those situations try mode 2 or use the default (mode 3, which requires no advancedsetting). Almost all ARM-based devices (such as"
            - link "Android" [ref=f16e1265] [cursor=pointer]:
              - /url: /web/20240101191552/https://kodi.wiki/view/Android
            - text: ) willl likely have flickering issues.
        - paragraph [ref=f16e1266]: Enable dirty-region processing. Dirty regions are any parts of the screen that have changed since the last frame. By not re-rendering what hasn't changed the GUI can be sped up. Because all GPUs work differently, only Mode 3 is guaranteed to work for everyone without flickering issues. This mode will reduce CPU/GPU usage, but will not increase GUI speed.
        - table [ref=f16e1267]:
          - rowgroup [ref=f16e1268]:
            - row "value result description" [ref=f16e1269]:
              - columnheader "value" [ref=f16e1270]
              - columnheader "result" [ref=f16e1271]
              - columnheader "description" [ref=f16e1272]
            - row "0 Off The entire viewport is always rendered." [ref=f16e1273]:
              - rowheader "0" [ref=f16e1274]
              - cell "Off" [ref=f16e1275]
              - cell "The entire viewport is always rendered." [ref=f16e1276]
            - row "1 Union All dirty regions are grouped into the smallest possible rectangle. This is typically the fastest mode for slower GPUs due to only making one pass." [ref=f16e1277]:
              - rowheader "1" [ref=f16e1278]
              - cell "Union" [ref=f16e1279]
              - cell "All dirty regions are grouped into the smallest possible rectangle. This is typically the fastest mode for slower GPUs due to only making one pass." [ref=f16e1280]
            - row "2 Cost reduction Each dirty region is presented separately, in as many passes as there are regions." [ref=f16e1281]:
              - rowheader "2" [ref=f16e1282]
              - cell "Cost reduction" [ref=f16e1283]
              - cell "Each dirty region is presented separately, in as many passes as there are regions." [ref=f16e1284]
            - row "3 Whole Screen The entire screen is rendered if there are any dirty regions. This is a safe default for drivers that clear buffer contents (manifests as blinking or vibrating images). Default" [ref=f16e1285]:
              - rowheader "3" [ref=f16e1286]
              - cell "Whole Screen" [ref=f16e1287]
              - cell "The entire screen is rendered if there are any dirty regions. This is a safe default for drivers that clear buffer contents (manifests as blinking or vibrating images). Default" [ref=f16e1288]
        - paragraph [ref=f16e1289]: "Example:"
        - generic [ref=f16e1290]: <gui> <algorithmdirtyregions>1</algorithmdirtyregions> </gui>
        - paragraph [ref=f16e1291]
        - heading "visualizedirtyregions" [level=3] [ref=f16e1292]
        - paragraph
        - generic [ref=f16e1293]:
          - text: "See also:"
          - link "HOW-TO:Modify dirty regions" [ref=f16e1295] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/HOW-TO:Modify_dirty_regions
        - paragraph [ref=f16e1296]: Enable dirty-region visualization. Paints a rectangle over marked controls.
        - list [ref=f16e1297]:
          - listitem [ref=f16e1298]: "true: on"
          - listitem [ref=f16e1299]: "false: off (Default)"
        - paragraph [ref=f16e1300]:
          - generic [ref=f16e1301]: "Note: This is only a development mode and isn't of use to normal users."
        - paragraph [ref=f16e1302]: "Example:"
        - generic [ref=f16e1303]: <gui> <visualizedirtyregions>true</visualizedirtyregions> </gui>
        - paragraph [ref=f16e1304]
        - heading "smartredraw" [level=3] [ref=f16e1305]
        - paragraph [ref=f16e1306]:
          - generic [ref=f16e1307]: "Note: This is an experimental feature and you might face issues using it. So please be aware of that."
        - paragraph [ref=f16e1308]: This new feature was introduced in Kodi 18 and if enabled, the GUI process call (and therefore the render call) is only done if anything has changed. The result will be a faster GUI and less load if Kodi plays a video
        - list [ref=f16e1309]:
          - listitem [ref=f16e1310]: "true: on"
          - listitem [ref=f16e1311]: "false: off (Default)"
        - paragraph [ref=f16e1312]: "Example:"
        - generic [ref=f16e1313]: <gui> <smartredraw>true</smartredraw> </gui>
        - paragraph [ref=f16e1314]
        - heading "showexitbutton" [level=3] [ref=f16e1315]
        - paragraph [ref=f16e1316]: Setting to hide the exit button, useful for people running appliance based setups where exit would only confuse/complicate the user. Modifiable via the advancedsettings.xml by setting showexitbutton to false, default is true (show)
        - paragraph [ref=f16e1317]: "Example:"
        - generic [ref=f16e1318]: <showexitbutton>true</showexitbutton>
        - paragraph [ref=f16e1319]
        - heading "fullscreen" [level=3] [ref=f16e1320]
        - paragraph [ref=f16e1321]: Starts Kodi in full screen (check resolutions!).
        - generic [ref=f16e1322]: <fullscreen>false</fullscreen>
        - paragraph [ref=f16e1323]
        - heading "splash" [level=3] [ref=f16e1324]
        - paragraph [ref=f16e1325]: Set to false if you wish to disable the startup splash image. Defaults to true.
        - generic [ref=f16e1326]: <splash>true</splash>
        - paragraph [ref=f16e1327]
        - heading "cputempcommand" [level=3] [ref=f16e1328]
        - paragraph [ref=f16e1329]: Provide a shell command Kodi will use to get CPU temperature. It should print out only "[temp as integer] [scale as one of "CcFf"]".
        - term [ref=f16e1331]: For Nvidia and Raspberry Pi
        - generic [ref=f16e1332]: "<cputempcommand>sed -e 's/\\([0-9]*\\)[0-9]\\{3\\}.*/\\1 C/' /sys/class/thermal/thermal_zone0/temp</cputempcommand>"
        - paragraph [ref=f16e1333]: or
        - generic [ref=f16e1334]: "<cputempcommand>echo \"$(sensors -u | tail -n64 | grep temp1_input | awk '{print $2 }' |awk '{printf(\"%d\\n\",$1 + 0.5);}') C\"</cputempcommand>"
        - term [ref=f16e1336]: For ATI/AMD
        - generic [ref=f16e1337]: "<cputempcommand>sensors|sed -ne \"s/temp1: \\+[-+]\\([0-9]\\+\\).*/\\1 C/p\"</cputempcommand>"
        - paragraph [ref=f16e1338]
        - heading "gputempcommand" [level=3] [ref=f16e1339]
        - paragraph [ref=f16e1340]: Provide a shell command Kodi will use to get GPU temperature. It should print out only "[temp as integer] [scale as one of "CcFf"]".
        - term [ref=f16e1342]: For Nvidia
        - generic [ref=f16e1343]: <gputempcommand>echo "$(nvidia-settings -tq gpuCoreTemp) C"</gputempcommand>
        - paragraph [ref=f16e1344]: or
        - generic [ref=f16e1345]: <gputempcommand>echo "$(nvidia-smi -q -d TEMPERATURE | grep Gpu | cut -c35-36) C"</gputempcommand>
        - term [ref=f16e1347]: For ATI/AMD
        - generic [ref=f16e1348]: <gputempcommand>/usr/bin/aticonfig --od-gettemperature | grep Temperature | cut -f 2 -d "-" | cut -f 1 -d "." | sed -e "s, ,," | sed 's/$/ C/'</gputempcommand>
        - term [ref=f16e1350]: For Raspberry Pi
        - generic [ref=f16e1351]: <gputempcommand>/opt/vc/bin/vcgencmd measure_temp | sed -e "s/temp=//" -e "s/\..*'/ /"</gputempcommand>
        - paragraph [ref=f16e1352]
        - heading "glrectanglehack" [level=3] [ref=f16e1353]
        - paragraph [ref=f16e1354]: Problems with ghosting or videos which are only played back in the left upper quarter? The following ATI hack may solve it.
        - generic [ref=f16e1355]: <glrectanglehack>yes</glrectanglehack>
        - paragraph [ref=f16e1356]
        - heading "alwaysontop" [level=3] [ref=f16e1357]
        - paragraph [ref=f16e1358]: Added in XBMC v9.11 (Windows OS only). Keeps Kodi always on top when windowed.
        - generic [ref=f16e1359]: <alwaysontop>yes</alwaysontop>
        - paragraph [ref=f16e1360]: There is also a fake fullscreen GUI option in Kodi's settings.
        - paragraph [ref=f16e1361]
