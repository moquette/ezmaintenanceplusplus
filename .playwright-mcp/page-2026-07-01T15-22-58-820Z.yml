        - heading "languagecodes" [level=3] [ref=f16e769]
        - paragraph [ref=f16e770]: User-defined translation table for language codes used in subtitles and audio. It can be used to add, extend or override Kodi's language codes.
        - paragraph [ref=f16e771]: "How to add a new language code:"
        - generic [ref=f16e772]: <languagecodes> <code> <short>alt</short> <long>Alternate</long> </code> </languagecodes>
        - paragraph [ref=f16e773]:
          - text: "How to add a new language code with subtag (e.g. pt-BR):"
          - generic [ref=f16e774]: "Note: This support is available from Kodi v20"
        - generic [ref=f16e775]: <languagecodes> <code> <short>pt-BR</short> <long>Portuguese - Brazil</long> </code> </languagecodes>
        - paragraph [ref=f16e776]:
          - text: "NOTE FOR MKV FILES:"
          - text: MKV files that contain audio/subtitle tracks with language codes with subtags are not yet supported, but from
          - code [ref=f16e777]: Kodi v21
          - text: "a workaround was introduced that allows Kodi to recognize language codes with subtags. To use the workaround, you must open the MKV file with an editor and in the metadata of the desired audio/subtitle track, edit the track Name (or Title field) by adding the language code wrapped in curly brackets, as in following example:"
          - code [ref=f16e778]: "Original track name: Audio portuguese/brazil"
          - code [ref=f16e779]: "Modified track name: Audio portuguese/brazil {pt-BR}"
        - paragraph [ref=f16e780]: "How to extend an existing language code:"
        - paragraph [ref=f16e781]: "Set the same \"long\" description of the existing language, for example we reuse the Portughese language for another language code:"
        - generic [ref=f16e782]: <languagecodes> <code> <short>pt-BR</short> <long>Portuguese</long> </code> </languagecodes>
        - paragraph [ref=f16e783]: In this case when in Kodi settings you set the "Portuguese" language, when in playing according to availability the track "pt" or "pt-BR" will be chosen.
        - paragraph [ref=f16e784]: "How to override an existing language code:"
        - paragraph [ref=f16e785]: This allow you to rename an existing language. Set to an existing language code your preferred "long" name description.
        - paragraph [ref=f16e786]: "WARNING: This can cause problems with add-ons, so do not override languages if you are not aware of the side effects."
        - generic [ref=f16e787]: <languagecodes> <code> <short>en</short> <long>English example</long> </code> <code> <short>en-GB</short> <long>English example</long> </code> </languagecodes>
        - heading "moviestacking" [level=3] [ref=f16e788]
        - paragraph
        - generic [ref=f16e790]:
          - text: "Main page:"
          - link "Naming_video_files/Movies" [ref=f16e792] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Naming_video_files/Movies
        - paragraph [ref=f16e793]:
          - text: This is used by the
          - link "file stacking" [ref=f16e794] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Naming_video_files/Movies#Split_Video_Files
          - text: algorithm to combine multi-part files and contains a list of regular expressions. For stacking videos that are contained in folders, such as VIDEO_TS folders, see
          - link "<folderstacking>" [ref=f16e796] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#folderstacking
        - paragraph [ref=f16e797]: As of v9.11, video stacking regular expressions must contain exactly four (4) capture expressions.
        - paragraph [ref=f16e798]: "Default:"
        - generic [ref=f16e799]: <moviestacking> <!-- <cd/dvd/part/pt/disk/disc> <0-N> --> <regexp>(.*?)([ _.-]*(?:cd|dvd|p(?:ar)?t|dis[ck])[ _.-]*[0-9]+)(.*?)(\.[^.]+)$</regexp> <!-- <cd/dvd/part/pt/disk/disc> <a-d> --> <regexp>(.*?)([ _.-]*(?:cd|dvd|p(?:ar)?t|dis[ck])[ _.-]*[a-d])(.*?)(\.[^.]+)$</regexp> <!-- movienamea-xvid.avi, movienameb-xvid.avi --> <regexp>(.*?)([ ._-]*[a-d])(.*?)(\.[^.]+)$</regexp> </moviestacking>
        - paragraph [ref=f16e800]: If the argument action="append" or append="yes" is supplied, the default moviestacking regular expressions will remain intact and the user specified ones will be added to the end.
        - paragraph [ref=f16e801]: "Example:"
        - generic [ref=f16e802]: <moviestacking action="append"> <!-- This expression will match movename1-xvid.avi, moviename2-xvid.avi. Be warned that it will likely stack sequels in a flat directory layout, so it is only recommend in a dir-per-video layout. --> <regexp>(.*?)([ ._-]*[0-9])(.*?)(\.[^.]+)$</regexp> </moviestacking>
        - paragraph [ref=f16e803]: If the argument action="prepend" is supplied, the default moviestacking regular expressions will remain intact and the user specified ones will be added to the beginning.
        - paragraph [ref=f16e804]: "Example:"
        - generic [ref=f16e805]: <moviestacking action="prepend"> <regexp>(Title)(Volume)(Ignore)(Extension)</regexp> </moviestacking>
        - paragraph [ref=f16e806]: If no argument is supplied, or the argument append="no" is supplied, the default moviestacking regular expressions are overwritten by the user specified ones.
        - paragraph [ref=f16e807]
        - heading "folderstacking" [level=3] [ref=f16e808]
        - generic [ref=f16e810]:
          - text: "Main page:"
          - link "Naming_video_files/Movies" [ref=f16e812] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Naming_video_files/Movies
        - paragraph [ref=f16e813]:
          - text: This is similar to
          - link "<moviestacking>" [ref=f16e815] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#moviestacking
          - text: ", but is used for videos that are contained in folders that use the folder names to stack, such as VIDEO_TS folders (DVD rips that are not in ISO format)."
        - paragraph [ref=f16e816]: "Default:"
        - generic [ref=f16e817]: <folderstacking> <!-- <cd/dvd/disk/disc> <0-N> --> <regexp>((cd|dvd|dis[ck])[0-9]+)$</regexp> </folderstacking>
        - heading "cleandatetime" [level=3] [ref=f16e818]
        - paragraph [ref=f16e819]: Matches a year number in a string using a Regular Expression
        - paragraph [ref=f16e820]: "Default expression:"
        - generic [ref=f16e821]: <video> <cleandatetime>(.*[^ _\,\.\(\)\[\]\-])[ _\.\(\)\[\]\-]+(19[0-9][0-9]|20[0-9][0-9])([ _\,\.\(\)\[\]\-]|[^0-9]$)?</cleandatetime> </video>
        - definition [ref=f16e823]:
          - list [ref=f16e824]:
            - listitem [ref=f16e825]: The string found before will be used as basis string getting cleaned by the cleanstrings expressions.
            - listitem [ref=f16e826]: By default date formats like MM:YY are ignored.
        - heading "cleanstrings" [level=3] [ref=f16e827]
        - paragraph [ref=f16e828]: Clean unwanted characters from filenames or folders by using a list of Regular Expressions. Please note that everything right of the match (at the end of the file name) is removed, so if you would have a file named Super movie.mp4 and would add <regexp> </regexp> (only a space), the only thing that would be left is Super, which is probably not what you want.
        - table [ref=f16e829]:
          - rowgroup [ref=f16e830]:
            - row "Github Logo.png Code in Github" [ref=f16e831]:
              - cell "Github Logo.png" [ref=f16e832]:
                - img "Github Logo.png" [ref=f16e833]
              - cell "Code in Github" [ref=f16e834]:
                - link "Code in Github" [ref=f16e837] [cursor=pointer]:
                  - /url: https://web.archive.org/web/20240101191552/https://github.com/xbmc/xbmc/blob/Nexus/xbmc/settings/AdvancedSettings.cpp#L201-L211
        - paragraph [ref=f16e838]: "Default expressions:"
        - generic [ref=f16e839]: <video> <cleanstrings> <regexp>([ _\\,\\.\\(\\)\\[\\]\\-](10bit|480p|480i|576p|576i|720p|720i|1080p|1080i|2160p|3d|aac|ac3|aka|atmos|avi|bd5|bdrip|bluray|brrip|cam|cd[1-9]|custom|dc|ddp|divx|divx5|dolbydigital|dolbyvision|dsr|dsrip|dts|dts-hdma|dts-hra|dts-x|dv|dvd|dvd5|dvd9|dvdivx|dvdrip|dvdscr|dvdscreener|extended|fragment|fs|h264|h265|hdr|hdr10|hevc|hddvd|hdrip|hdtv|hdtvrip|hrhd|hrhdtv|internal|limited|multisubs|nfofix|ntsc|ogg|ogm|pal|pdtv|proper|r3|r5|read.nfo|remastered|remux|repack|rerip|retail|screener|se|svcd|tc|telecine|telesync|truehd|ts|uhd|unrated|ws|x264|x265|xvid|xvidvd|xxx|web-dl|webrip|www.www|\\[.*\\])([ _\\,\\.\\(\\)\\[\\]\\-]|$)");</regexp> <regexp>(\[.*\])</regexp> </cleanstrings> </video>
        - paragraph [ref=f16e840]:
          - text: Updated in v20
          - superscript [ref=f16e841]:
            - link "[5]" [ref=f16e842] [cursor=pointer]:
              - /url: "#cite_note-5"
        - definition [ref=f16e844]:
          - list [ref=f16e845]:
            - listitem [ref=f16e846]:
              - text: Arguments action="append" or action="prepend" will insert user specified expressions after, or before, the defaults above. (Further details in
              - link "moviestacking" [ref=f16e847] [cursor=pointer]:
                - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#.3Cmoviestacking.3E
              - text: section)
        - heading "tvshowmatching" [level=3] [ref=f16e848]
        - paragraph [ref=f16e849]: Matches the season and episode numbers in file paths by using a list of Regular Expressions
        - table [ref=f16e850]:
          - rowgroup [ref=f16e851]:
            - row "Github Logo.png Code in Github" [ref=f16e852]:
              - cell "Github Logo.png" [ref=f16e853]:
                - img "Github Logo.png" [ref=f16e854]
              - cell "Code in Github" [ref=f16e855]:
                - link "Code in Github" [ref=f16e858] [cursor=pointer]:
                  - /url: https://web.archive.org/web/20240101191552/https://github.com/xbmc/xbmc/blob/Matrix/xbmc/settings/AdvancedSettings.cpp#L232
        - paragraph [ref=f16e859]: "Defaults:"
        - generic [ref=f16e860]: "<tvshowmatching> <regexp>s([0-9]+)[ ._x-]*e([0-9]+(?:(?:[a-i]|\\\\.[1-9])(?![0-9]))?)([^\\\\\\\\/]*)$</regexp> <!-- foo.s01.e01, foo.s01_e01, S01E02 foo, S01 - E02, S01xE02 --> <regexp>[\\._ -]()[Ee][Pp]_?([0-9]+)([^\\\\/]*)$</regexp> <!-- foo.ep01, foo.EP_01 --> <regexp>([0-9]{4})[\\.-]([0-9]{2})[\\.-]([0-9]{2})</regexp> <!-- foo.yyyy.mm.dd.* (byDate=true) --> <regexp>([0-9]{2})[\\.-]([0-9]{2})[\\.-]([0-9]{4})</regexp> <!-- foo.mm.dd.yyyy.* (byDate=true) --> <regexp>[\\\\/\\._ \\[\\(-]([0-9]+)x([0-9]+)([^\\\\/]*)$</regexp> <!-- foo.1x09* or just /1x09* --> <regexp>[\\\\/\\._ -]([0-9]+)([0-9][0-9])([\\._ -][^\\\\/]*)$</regexp> <!-- foo.103*, 103 foo --> <regexp>[\\/._ -]p(?:ar)?t[_. -]()([ivx]+)([._ -][^\\/]*)$</regexp> <!-- Part I, Pt.VI --> </tvshowmatching>"
        - definition [ref=f16e862]:
          - list [ref=f16e863]:
            - listitem [ref=f16e864]:
              - text: Arguments action="append" or action="prepend" will insert user specified expressions after, or before, the defaults above. (Further details in
              - link "moviestacking" [ref=f16e865] [cursor=pointer]:
                - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#.3Cmoviestacking.3E
              - text: section)
            - listitem [ref=f16e866]: Paths are converted to lower case before matching.
            - listitem [ref=f16e867]: For multi-episode matching to work, there needs to be a third set of parentheses '()' at the end, this part is fed back into the regexp engine.
            - listitem [ref=f16e868]:
              - text: A
              - link "forum thread" [ref=f16e869] [cursor=pointer]:
                - /url: https://web.archive.org/web/20240101191552/https://forum.kodi.tv/showthread.php?tid=51614
              - text: has a discussion of pre-made regex lists to match common names. These might improve Kodi's ability to match TV show names in some situations, at the risk of additional false positives.
        - heading "Filenames without Season" [level=4] [ref=f16e870]
        - paragraph [ref=f16e871]: There are two methods to add episodes without a season in their file path. Both ways will force the season to '1' by default, so that you can use the 'Use Absolute Ordering (Single Season)' setting from the TheTvDb.com scraper.
        - generic [ref=f16e872]:
          - term [ref=f16e873]: Simple Method (XBMC v9.11 onwards and Kodi)
          - definition [ref=f16e874]: Use only one pair of parentheses
        - generic [ref=f16e875]: <regexp>[/\._ \-]([0-9]+)</regexp>
        - generic [ref=f16e876]:
          - term [ref=f16e877]: Advanced Method (XBMC v10.05 onwards and Kodi)
          - definition [ref=f16e878]: Supports multi-episode files without season
          - definition [ref=f16e879]: Use an empty pair of parentheses for the season
        - generic [ref=f16e880]: <regexp>[/\._ \-]()([0-9]+)(-[0-9]+)?</regexp>
        - term [ref=f16e882]: Specifying Default Season (XBMC v12.0 onwards and Kodi)
        - paragraph [ref=f16e883]: It is possible to set the default season for specific regular expressions by setting the 'defaultseason' attribute.
        - generic [ref=f16e884]:
          - definition [ref=f16e885]: Works with both the simple method and advanced method
          - definition [ref=f16e886]: If not used, the season will be set to '1'
          - definition [ref=f16e887]: Useful for setting specials to season '0'
        - generic [ref=f16e888]: <regexp defaultseason="0">[/\._ \-]X()([0-9]+)(-[0-9]+)?</regexp> <regexp defaultseason="1">[/\._ \-]E()([0-9]+)(-[0-9]+)?</regexp>
        - heading "tvmultipartmatching" [level=3] [ref=f16e889]
        - paragraph [ref=f16e890]: Matches a multipart episode number based on a previously identified episode file, using a list of Regular Expressions.
        - paragraph [ref=f16e891]: "Default:"
        - generic [ref=f16e892]: <tvmultipartmatching>^[-_ex]+([0-9]+(?:(?:[a-i]|\\.[1-9])(?![0-9]))?)</tvmultipartmatching>
        - definition [ref=f16e894]:
          - list [ref=f16e895]:
            - listitem [ref=f16e896]: Text matching is compared case-insensitive.
            - listitem [ref=f16e897]: Specifying this option replaces the default value
        - heading "excludefromscan" [level=3] [ref=f16e898]
        - paragraph [ref=f16e899]: Matches filenames or folders which should be excluded from a library scan (except tvshows) using a list of Regular Expressions. This can be for both Video or Audio sections of advancedsettings.xml.
        - paragraph [ref=f16e900]: "Defaults:"
        - generic [ref=f16e901]: <video> <excludefromscan> <regexp>-trailer</regexp> <regexp>[!-._ \\/]sample[-._ \\/]</regexp> </excludefromscan> </video>
        - definition [ref=f16e903]:
          - list [ref=f16e904]:
            - listitem [ref=f16e905]:
              - text: Arguments action="append" or action="prepend" will insert user specified expressions after, or before, the defaults above. (Further details in
              - link "moviestacking" [ref=f16e906] [cursor=pointer]:
                - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#.3Cmoviestacking.3E
              - text: section)
        - heading "excludefromlisting" [level=3] [ref=f16e907]
        - paragraph
        - generic [ref=f16e908]: <video> <excludefromlisting> <!-- Regular expressions that if evaluated to true won't be displayed in Files View --> <regexp>[-\._ ](sample|trailer)[-\._ ]</regexp> </excludefromlisting> </video>
        - heading "excludetvshowsfromscan" [level=3] [ref=f16e909]
        - paragraph [ref=f16e910]: Matches filenames or folders which should be excluded from a tvshow library scan using a list of Regular Expressions
        - paragraph [ref=f16e911]: "Defaults:"
        - generic [ref=f16e912]: <video> <excludetvshowsfromscan> <regexp>[!-._ \\/]sample[-._ \\/]</regexp> </excludetvshowsfromscan> </video>
        - definition [ref=f16e914]:
          - list [ref=f16e915]:
            - listitem [ref=f16e916]:
              - text: Arguments action="append" or action="prepend" will insert user specified expressions after, or before, the defaults above. (Further details in
              - link "moviestacking" [ref=f16e917] [cursor=pointer]:
                - /url: /web/20240101191552/https://kodi.wiki/view/Advancedsettings.xml#.3Cmoviestacking.3E
              - text: section)
        - heading "trailermatching" [level=3] [ref=f16e918]
        - paragraph [ref=f16e919]: Contains Regular Expression syntax to match the locally stored trailers to movies in the library.
        - generic [ref=f16e920]: <trailermatching> <!-- This regexp will match moviename_Trailer.avi --> <regexp>(.*?)(_Trailer)(\.[^.]+)$</regexp> </trailermatching>
        - heading "videolibrary" [level=3] [ref=f16e921]
        - paragraph [ref=f16e922]: Options specific to the Video Library
        - paragraph [ref=f16e923]:
          - generic [ref=f16e924]:
            - text: "Note: Kodi v20 users don't need set \"importwatched\" or \"importresumepoint\" to true anymore as that's the default then"
            - superscript [ref=f16e925]:
              - link "[6]" [ref=f16e926] [cursor=pointer]:
                - /url: "#cite_note-6"
        - generic [ref=f16e927]: <videolibrary> <allitemsonbottom>false</allitemsonbottom> <!-- sorts the "*All" items at the bottom of the list when in Ascending order --> <cleanonupdate>false</cleanonupdate> <!-- default set to false to prevent Kodi from removing items from the database while updating. --> <usefasthash>true</usefasthash> <!-- defaults to true. Set to false in order to skip hashing based on the folders modification time. --> <recentlyaddeditems>35</recentlyaddeditems> <!-- number of recently added items. Defaults to 25 --> <itemseparator> / </itemseparator> <!-- separator used for multiple artists/genres in tags. Note, this is *space* *slash* *space* --> <exportautothumbs>false</exportautothumbs> <!-- export auto-generated thumbs. Defaults to false --> <importwatchedstate>false</importwatchedstate> <!-- import previously exported playdate and playcount from .nfo files. Defaults to false --> <importresumepoint>false</importresumepoint> <!-- import previously exported resume point from .nfo files. Defaults to false --> <dateadded>1</dateadded> <!-- 0 results in using the current datetime when adding a video; 1 (default) results in prefering to use the files mtime (if it's valid) and only using the file's ctime if the mtime isn't valid; 2 results in using the newer datetime of the file's mtime and ctime --> </videolibrary>
        - heading "videoscanner" [level=3] [ref=f16e928]
        - paragraph [ref=f16e929]: Options specific to the Video scanner
        - generic [ref=f16e930]: <videoscanner> <ignoreerrors>true</ignoreerrors> <!-- Set to true to silently ignore errors while scanning videos. This prevents the error dialogue box, so you don't have to keep hitting "yes" to keep scanning.--> </videoscanner>
        - heading "Library artwork" [level=2] [ref=f16e931]
        - paragraph [ref=f16e932]:
          - generic [ref=f16e933]: "Note: Using <imageres>9999</imageres> and <fanartres>9999</fanartres> will allow caching artwork at original size."
        - heading "imageres" [level=3] [ref=f16e934]
        - paragraph
        - paragraph [ref=f16e935]:
          - text: Specify the maximum resolution that
          - link "cached artwork" [ref=f16e936] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Artwork/Cache#Texture_optimization
          - text: (other than fanart / 16:9 images) should be resized to in pixels. The width is automatically calculated as being 16/9*height. The image will be resized to fit within this size. e.g. an image that is 2000x500 will be cached at size 1280x320. An image that is 500x800 will be cached at size 450x720 using the default value of 720.
        - generic [ref=f16e937]: <imageres>720</imageres>
        - heading "fanartres" [level=3] [ref=f16e938]
        - paragraph
        - paragraph [ref=f16e939]:
          - text: Specify the maximum resolution that
          - link "cached fanart" [ref=f16e940] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Artwork/Cache#Texture_optimization
          - text: should be resized to in pixels. The width is automatically calculated as being 16/9*height. Only images that are exactly 16x9 and equal to or greater than this resolution will be cached at this size - all other images will be cached using <imageres>. The default value is 1080.
        - generic [ref=f16e941]: <fanartres>1080</fanartres>
        - heading "imagescalingalgorithm" [level=3] [ref=f16e942]
        - paragraph [ref=f16e943]:
          - text: Specify the image scaling algorithm for image resizing when
          - link "caching artwork" [ref=f16e944] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Artwork/Cache#Texture_optimization
          - text: to the local texture cache.
        - generic [ref=f16e945]: <imagescalingalgorithm>bicubic</imagescalingalgorithm>
        - paragraph [ref=f16e946]:
          - link "Available image scaling algorithms" [ref=f16e947] [cursor=pointer]:
            - /url: https://web.archive.org/web/20240101191552/https://github.com/xbmc/xbmc/blob/master/xbmc/pictures/PictureScalingAlgorithm.cpp#L20-L32
        - generic [ref=f16e948]: fast_bilinear bilinear bicubic experimental nearest_neighbor averaging_area bicublin gaussian sinc lanczos bicubic_spline
        - heading "imagequalityjpeg" [level=3] [ref=f16e949]
        - paragraph [ref=f16e950]:
          - text: This specifies the quality of the images when stored in jpeg format. By default kodi uses a quality of 4 which is a good compromise between size and quality. If you want to reduce the thumbnail sizes (decreasing quality) choose a higher value up to 21. If high quality (large thumbnail size) is needed, chose a smaller value, e.g. 0,1,2 or 3. (Added in v20
          - superscript [ref=f16e951]:
            - link "[7]" [ref=f16e952] [cursor=pointer]:
              - /url: "#cite_note-7"
          - text: )
        - generic [ref=f16e953]: <imagequalityjpeg>4</imagequalityjpeg>
        - heading "Video and music library settings" [level=2] [ref=f16e954]
        - heading "playlistasfolders" [level=3] [ref=f16e955]
        - paragraph [ref=f16e956]: In the recent releases, playlists are treated as folders. Selecting a playlist no longer plays it, but opens it, as if it were a folder.
        - paragraph [ref=f16e957]: Set to false to revert to the previous behaviour. When you select a playlist, its content is added to the list of elements to be played.
        - definition [ref=f16e959]:
          - generic [ref=f16e960]: "Note: This setting will not affect smart playlists, they will always show as folders."
        - term [ref=f16e962]: Example
        - generic [ref=f16e963]: <playlistasfolders>true</playlistasfolders>
        - heading "playlistretries" [level=3] [ref=f16e964]
        - paragraph [ref=f16e965]: The number of retries attempted if a source is offline. With this control you can alter the number of consecutive failed items before a playlist fails.
        - paragraph [ref=f16e966]: "Default:"
        - generic [ref=f16e967]: <playlistretries>100</playlistretries>
        - heading "playlisttimeout" [level=3] [ref=f16e968]
        - paragraph [ref=f16e969]: The timeout, in seconds, before item failure.
        - paragraph [ref=f16e970]: "Default:"
        - generic [ref=f16e971]: <playlisttimeout>20</playlisttimeout>
        - paragraph [ref=f16e972]
        - heading "sorttokens" [level=3] [ref=f16e973]
        - paragraph [ref=f16e974]:
          - text: Allows you to specify additional tokens that will be ignored at the start of lines during sorting.
          - generic [ref=f16e975]: "Note: Sort tokens are case sensitive."
        - generic [ref=f16e976]: <sorttokens> <token>the</token> </sorttokens>
        - paragraph [ref=f16e977]: In the above example "the ", "the." and "the_" will be ignored at the start of titles or names when sorting items, in both video and music libraries. A separator can also be specified, for example
        - generic [ref=f16e978]: <sorttokens> <token separators="'">L</token> </sorttokens>
        - paragraph [ref=f16e979]: In that case the value L', as in French movie name L'argent, will be ignored and the item listed under "A".
        - paragraph [ref=f16e980]
        - heading "musicdatabase/videodatabase" [level=3] [ref=f16e981]: musicdatabase/videodatabase
        - paragraph
        - generic [ref=f16e983]:
          - text: "Main page:"
          - link "MySQL" [ref=f16e985] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/MySQL
        - paragraph [ref=f16e986]: Allows advanced customization of the default database settings for music, video, TV, EPG, and ADSP databases.
        - definition [ref=f16e988]:
          - generic [ref=f16e989]: "Note: It is HIGHLY recommended that you not attempt to place an sqlite3 database outside of kodi's path. sqlite3 contains no filesystem abstraction, so this will plain break on any non-local (as far as Kodi is concerned) paths. Use this for mysql only."
        - paragraph [ref=f16e990]: "Parent tags:"
        - paragraph [ref=f16e991]
        - list [ref=f16e992]:
          - listitem [ref=f16e993]: <videodatabase>
          - listitem [ref=f16e994]: <musicdatabase>
          - listitem [ref=f16e995]: <tvdatabase> - Highly experimental/unstable and no practical benefit for most users. Avoid using.
          - listitem [ref=f16e996]: <epgdatabase> - Highly experimental/unstable and no practical benefit for most users. Avoid using.
          - listitem [ref=f16e997]: <adspdatabase> - Highly experimental/unstable and no practical benefit for most users. Avoid using.
        - table [ref=f16e998]:
          - rowgroup [ref=f16e999]:
            - row "Stop hand.png Kodi also supports using MySQL for PVR (tvdatabase and epgdatabase) as well as the ADSP database. However, there is little to no practical benefit to using MySQL for those databases, and there has been very little testing with them (expect bugs!). Unless you simply want to experiment, or have a very specific need, you should avoid using MySQL for PVR and ADSP." [ref=f16e1000]:
              - cell "Stop hand.png" [ref=f16e1001]:
                - img "Stop hand.png" [ref=f16e1002]
              - cell "Kodi also supports using MySQL for PVR (tvdatabase and epgdatabase) as well as the ADSP database. However, there is little to no practical benefit to using MySQL for those databases, and there has been very little testing with them (expect bugs!). Unless you simply want to experiment, or have a very specific need, you should avoid using MySQL for PVR and ADSP." [ref=f16e1003]
        - paragraph [ref=f16e1004]
        - paragraph [ref=f16e1005]: "Child tags:"
        - paragraph [ref=f16e1006]
        - generic [ref=f16e1007]:
          - term [ref=f16e1008]: <type>
          - definition [ref=f16e1009]: "Required - Can be either \"sqlite3\" or \"mysql\" (default: sqlite3)"
        - paragraph [ref=f16e1010]
        - generic [ref=f16e1011]:
          - term [ref=f16e1012]: <host>
          - definition [ref=f16e1013]: Required -
        - list [ref=f16e1014]:
          - listitem [ref=f16e1015]: "sqlite3: defines the relative path to the database file (eg. /usr/local/kodi/databases)."
          - listitem [ref=f16e1016]: "mysql: defines the host of the mysql socket (eg. localhost, 192.168.0.1, etc)"
        - paragraph [ref=f16e1017]
        - generic [ref=f16e1018]:
          - term [ref=f16e1019]: <port>
          - definition [ref=f16e1020]: Optional -
        - list [ref=f16e1021]:
          - listitem [ref=f16e1022]: "sqlite3: silently ignored"
          - listitem [ref=f16e1023]: "mysql: defines the port of the mysql socket (default: 3306)"
        - paragraph [ref=f16e1024]
        - generic [ref=f16e1025]:
          - term [ref=f16e1026]: <name>
          - definition [ref=f16e1027]: Optional -
          - definition [ref=f16e1028]: by default "MyVideos"+DB number will be used.
        - list [ref=f16e1029]:
          - listitem [ref=f16e1030]: "sqlite3: defines the name of the database file to read from, excluding the \".db\" extension."
          - listitem [ref=f16e1031]: "mysql: defines the name of the database to use"
        - paragraph [ref=f16e1032]
        - generic [ref=f16e1033]:
          - term [ref=f16e1034]: <user>
          - definition [ref=f16e1035]: Required for MySQL -
        - list [ref=f16e1036]:
          - listitem [ref=f16e1037]: "sqlite3: silently ignored"
          - listitem [ref=f16e1038]: "mysql: defines the user with privileged access to the database"
        - paragraph [ref=f16e1039]
        - generic [ref=f16e1040]:
          - term [ref=f16e1041]: <pass>
          - definition [ref=f16e1042]: Required for MySQL -
        - list [ref=f16e1043]:
          - listitem [ref=f16e1044]: "sqlite3: silently ignored"
          - listitem [ref=f16e1045]: "mysql: defines the password for the user with privileged access to the database"
        - paragraph [ref=f16e1046]
        - generic [ref=f16e1047]:
          - term [ref=f16e1048]: <compression>
          - definition [ref=f16e1049]:
            - text: Optional - Defaults to false. Set to "true" to enable MySQL compression protocol. Performance benefit is going to be largely dependent on the network bandwidth, latency between database and clients and on the size of the result sets.
            - link "[1]" [ref=f16e1050] [cursor=pointer]:
              - /url: https://web.archive.org/web/20240101191552/https://github.com/xbmc/xbmc/pull/6484
          - definition [ref=f16e1051]:
            - generic [ref=f16e1052]: "Note: Slower clients (such as the RPi and others) won't benefit from it as the zlib de-compression overhead is higher than the actual compression savings"
        - paragraph [ref=f16e1053]
        - generic [ref=f16e1054]:
          - term [ref=f16e1055]: <key>
          - definition [ref=f16e1056]:
            - text: Optional - SSL setting for MySQL
