        - paragraph [ref=f16e1442]
        - heading "guisettings.xml Setting Conversion" [level=1] [ref=f16e1443]
        - paragraph [ref=f16e1444]:
          - text: It is possible to convert settings found in the
          - link "Settings" [ref=f16e1446] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Settings
          - text: (guisettings.xml) pages of Kodi into entries for the advancedsettings.xml file.
        - paragraph [ref=f16e1447]: When a setting from the guisettings.xml is added to the advancedsettings.xml file, it will override the existing guisettings.xml values and the setting will be removed from the settings pages.
        - paragraph [ref=f16e1448]: Why would I need to do this?
        - list [ref=f16e1449]:
          - listitem [ref=f16e1450]: You set up multiple devices and then need to individually change settings and preferences on each device. Using this conversion method, you save those settings in the advancedsettings.xml file and simply add the file to each device
          - listitem [ref=f16e1451]: You need to hide settings to prevent those settings from being modified
        - paragraph [ref=f16e1452]: "To convert a guisetting to advancedsettings.xml follow these steps:"
        - list [ref=f16e1453]:
          - listitem [ref=f16e1454]: In the Kodi settings pages, adjust the setting(s) to your preference.
          - listitem [ref=f16e1455]: Back out of the settings pages to the main menu, which forces Kodi to save the adjusted settings to the guisettings.xml file
          - listitem [ref=f16e1456]:
            - text: Locate the guisettings.xml file in the
            - link "Userdata" [ref=f16e1457] [cursor=pointer]:
              - /url: /web/20240101191552/https://kodi.wiki/view/Userdata
            - text: folder and open it
          - listitem [ref=f16e1458]: Locate the setting(s) to be converted. The list can be overwhelming so make use of the Search feature of whichever editor you are using
          - listitem [ref=f16e1459]: "Using the following setting as an example:"
        - generic [ref=f16e1460]: <setting id="videolibrary.showemptytvshows">true</setting>
        - generic [ref=f16e1461]:
          - definition [ref=f16e1462]:
            - text: "Breaking down the string:"
            - generic [ref=f16e1463]:
              - definition [ref=f16e1464]: videolibrary- parent tag
              - definition [ref=f16e1465]: showemptytvshows- child tag
              - definition [ref=f16e1466]: true- value
          - definition [ref=f16e1467]: The conversion is as follows and place this in the advancedsettings.xml file
        - generic [ref=f16e1468]: <advancedsettings version="1.0"> <videolibrary> <showemptytvshows>true</showemptytvshows> </videolibrary> </advancedsettings>
        - paragraph [ref=f16e1469]: "Note: Some parent tags may already be in use in your advancedsettings.xml file. Do not duplicate them, but add the child tag beneath the existing parent tag."
        - paragraph [ref=f16e1470]
