          - generic [ref=f16e1364]: "Note: Available in Kodi v20 and above."
        - paragraph [ref=f16e1365]: Windows only. Minimizes Kodi to the system tray. Defaults to false.
        - generic [ref=f16e1366]: <minimizetotray>true</minimizetotray>
