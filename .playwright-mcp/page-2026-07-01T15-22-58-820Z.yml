        - paragraph [ref=f16e1074]: "Examples:"
        - paragraph [ref=f16e1075]: 1) Configure a database for MySQL.
        - definition [ref=f16e1077]:
          - generic [ref=f16e1078]:
            - text: "Note:"
            - generic [ref=f16e1079]: The <videodatabase>, <musicdatabase>, <tvdatabase>, <epgdatabase>, and <adspdatabase> tags are interchangeable here.
        - generic [ref=f16e1080]: <videodatabase> <type>mysql</type> <host>192.168.0.10</host> <name>kodi_video</name> <user>kodi</user> <pass>kodi</pass> </videodatabase>
        - paragraph [ref=f16e1081]: 2) Configure a database for an sqlite database.
        - definition [ref=f16e1083]:
          - generic [ref=f16e1084]:
            - text: "Note:"
            - generic [ref=f16e1085]: The <videodatabase>, <musicdatabase>, <tvdatabase>, <epgdatabase>, and <adspdatabase> tags are interchangeable here.
        - generic [ref=f16e1086]: <musicdatabase> <type>sqlite3</type> <host>/usr/local/share/kodi/databases</host> </musicdatabase>
        - paragraph [ref=f16e1087]
        - heading "externalplayer" [level=3] [ref=f16e1088]
        - paragraph
        - definition [ref=f16e1090]:
          - generic [ref=f16e1091]:
