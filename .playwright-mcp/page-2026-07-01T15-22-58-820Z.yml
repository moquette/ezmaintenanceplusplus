        - paragraph [ref=f16e470]:
          - text: "Note: The setting is persistent through shutdown and restarts."
          - text: "Note: If debugging is enabled in the GUI, loglevel will be set to 2. This will over-ride the"
          - code [ref=f16e471]: advancedsettings.xml
          - text: setting. You must disable the GUI Setting before adding the entry to
          - code [ref=f16e472]: advancedsettings.xml
          - text: .
        - definition [ref=f16e474]:
          - generic [ref=f16e476]:
            - text: "See also:"
            - link "Debug Log" [ref=f16e478] [cursor=pointer]:
