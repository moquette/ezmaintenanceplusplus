        - paragraph [ref=f16e727]: Commercial break detection not as good you think it could be? Are some commercial breaks in a series of adverts not being skipped? Are some parts being skipped that are clearly not commercials? Does the end of the previous recording still show? The following advanced settings can be used to better identify full commercial break sequences, remove incorrectly flagged commercial breaks, and have playback start at the actual beginning of the recording.
        - paragraph [ref=f16e728]
        - generic [ref=f16e729]: "<edl> <!-- if true, commercial breaks will be merged according to the remaining options. --> <mergeshortcommbreaks>false</mergeshortcommbreaks> <!-- Commercial breaks won't be merged if the total length of the commercial break would be greater than this (seconds) --> <maxcommbreaklength>250</maxcommbreaklength> <!-- After merging, commercial breaks shorter than this will be removed (seconds) --> <mincommbreaklength>90</mincommbreaklength> <!-- Commercial breaks that are further apart than this won't be merged (seconds) --> <maxcommbreakgap>120</maxcommbreakgap> <!-- How long to wait before automatically skipping when the start of a commercial break reached (seconds). Possible values: from -60 to 60--> <commbreakautowait>0</commbreakautowait> <!-- How long to rewind after automatically skipping to the end of the commercial break (seconds). Possible values: from -60 to 60 --> <commbreakautowind>0</commbreakautowind> <!-- Avoid showing the edl commbreak notifications. These are displayed by default --> <displaycommbreaknotifications>false</displaycommbreaknotifications> </edl>"
        - paragraph [ref=f16e730]: "Notes:"
        - list [ref=f16e731]:
          - listitem [ref=f16e732]:
            - text: displaycommbreaknotifications
            - superscript [ref=f16e733]:
              - link "[3]" [ref=f16e734] [cursor=pointer]:
                - /url: "#cite_note-3"
        - heading "PVR & Live TV" [level=2] [ref=f16e735]: PVR & Live TV
        - paragraph [ref=f16e736]: Settings available for PVR, EPG and Live TV. Edit Decision List settings are located in the previous section.
        - paragraph [ref=f16e737]
        - heading "pvr" [level=3] [ref=f16e738]
        - generic [ref=f16e739]: <pvr> <timecorrection>0</timecorrection> <!-- Correct all times (epg tags, timer tags, recording tags) by this amount of minutes. --> <infotoggleinterval>3000</infotoggleinterval> <!-- If there is more than one pvr gui info item available (e.g. multiple recordings active at the same time), use this toggle delay in milliseconds. --> <channeliconsautoscan>true</channeliconsautoscan> <!-- Automatically scan user defined folder for channel icons when loading internal channel groups. --> <autoscaniconsuserset>false</autoscaniconsuserset> <!-- Mark channel icons populated by auto scan as "user set". --> <numericchannelswitchtimeout>1000</numericchannelswitchtimeout> <!-- Time in ms before the numeric dialog auto closes when confirmchannelswitch is disabled. --> </pvr>
        - paragraph [ref=f16e740]
        - heading "pvrrecordings" [level=4] [ref=f16e741]
        - paragraph [ref=f16e742]:
          - text: In v19 and later, allows users to modify sort type and order of pvr recordings.
          - superscript [ref=f16e743]:
            - link "[4]" [ref=f16e744] [cursor=pointer]:
              - /url: "#cite_note-4"
        - term [ref=f16e746]: Note- These settings are child tags to the <pvr> tag in the previous section.
        - generic [ref=f16e747]: <pvr> <pvrrecordings> <sortmethod>2</sortmethod> <!-- 1=Name 2=Date 3=Size 4=File --> <sortorder>2</sortorder> <!-- 1=Ascending 2=Descending --> </pvrrecordings> </pvr>
        - heading "epg" [level=3] [ref=f16e748]
        - paragraph
        - generic [ref=f16e749]: "<epg> <updatecheckinterval>300</updatecheckinterval> <!-- Check every X seconds, if EPG data need to be updated. This does not mean that every X seconds an EPG update is actually triggered, it's just the interval how often to check whether an update should be triggered. If this value is greater than GUI setting 'epg.epgupdate' value, then EPG updates will done with the value specified for 'updatecheckinterval', effectively overriding the GUI setting's value. --> <updateemptytagsinterval>60</updateemptytagsinterval> <!-- If a TV channel has no EPG data, try to obtain data for that channel every X seconds. This overrides the GUI setting 'epg.epgupdate' value, but only for channels without EPG data. If this value is less than 'updatecheckinterval' value, then data update will be done with the interval specified by 'updatecheckinterval'. Example 1: epg.epgupdate = 120 (minutes!), updatecheckinterval = 300, updateemptytagsinterval = 60 => trigger an EPG update for every channel without EPG data every 5 minutes and trigger an EPG update for every channel with EPG data every 2 hours. Example 2: epg.epgupdate = 120 (minutes!), updatecheckinterval = 300, updateemptytagsinterval = 3600 => trigger an EPG update for every channel without EPG data every 2 hours and trigger an EPG update for every channel with EPG data every 1 hour. --> <cleanupinterval>900</cleanupinterval> <!-- remove old entries from the EPG every X seconds --> <activetagcheckinterval>60</activetagcheckinterval> <!-- check for updated active tags every X seconds --> <retryinterruptedupdateinterval>60</retryinterruptedupdateinterval> <!-- retry an interrupted EPG update after X seconds --> <displayupdatepopup>true</displayupdatepopup> <!-- display a progress popup while updating EPG data from clients --> <displayincrementalupdatepopup>false</displayincrementalupdatepopup> <!-- also display a progress popup while doing incremental EPG updates --> </epg>"
        - paragraph [ref=f16e750]
