              - cell
              - cell "▶ Settings" [ref=f16e410]:
                - img "▶" [ref=f16e411]
                - link "Settings" [ref=f16e412] [cursor=pointer]:
                  - /url: /web/20240101191552/https://kodi.wiki/view/Settings
              - cell "▶ advancedsettings.xml" [ref=f16e413]:
                - img "▶" [ref=f16e414]
                - text: advancedsettings.xml
        - paragraph [ref=f16e415]:
          - generic [ref=f16e417]: "Note: The advancedsettings.xml file does not exist by default. You have to create it first!"
        - paragraph [ref=f16e418]:
          - text: The advancedsettings.xml file, which does not exist by default, can be created by a user in their
          - link "userdata folder" [ref=f16e420] [cursor=pointer]:
            - /url: /web/20240101191552/https://kodi.wiki/view/Userdata
          - text: .
        - paragraph [ref=f16e421]: This file is used for advanced settings and options that do not have GUI controls inside of Kodi. Some settings are experimental or very rarely set, so they can only be used via the advancedsettings.xml file. The file is simply a plain text file and can be edited by various text editors, so long as the name is "advancedsettings.xml". These advanced settings can be used to tweak various things such as episode naming patterns, special network ports, special behaviors, and more.
        - paragraph [ref=f16e422]: The following page will describe the structure of the advancedsettings.xml file and the various individual settings.
        - paragraph [ref=f16e423]:
          - generic [ref=f16e424]: "Note:"
        - list [ref=f16e425]:
          - listitem [ref=f16e426]: All XML tags must be lowercase. The start and end of the advancedsettings.xml file must have the <advancedsettings> and </advancedsettings> tags.
          - listitem [ref=f16e427]: Kodi will only read the advancedsettings.xml file when it starts up. If you make changes while it is running then you must restart Kodi.
          - listitem [ref=f16e428]:
            - text: For some Windows versions, Kodi has two
            - code [ref=f16e429]: \userdata\
            - text: folders. The correct one to put the advancedsettings.xml file in is not the one in Program Files, but in
            - code [ref=f16e430]: "%appdata%\\Kodi\\userdata\\."
        - heading "Layout" [level=2] [ref=f16e431]
        - paragraph [ref=f16e432]:
          - text: The layout of
          - code [ref=f16e433]: advancedsettings.xml
          - text: "is as follows:"
        - generic [ref=f16e434]: <advancedsettings version="1.0"> <setting>value</setting> ... <setting>value</setting> </advancedsettings>
        - paragraph [ref=f16e435]: where "setting" gives the name of the setting, and "value" gives its value.
        - paragraph [ref=f16e436]: A list of the available "setting" strings and their values is given below.
        - heading "List of available settings" [level=1] [ref=f16e437]
        - paragraph [ref=f16e438]:
          - text: List of available settings that are recognised in the advancedsettings.xml file
          - superscript [ref=f16e439]:
            - link "[1]" [ref=f16e440] [cursor=pointer]:
              - /url: "#cite_note-1"
        - paragraph [ref=f16e441]: "Recommended: Use the table of contents or the search function in your browser to locate items."
        - paragraph [ref=f16e442]
        - heading "Troubleshooting settings" [level=2] [ref=f16e443]
        - heading "loglevel" [level=3] [ref=f16e444]
        - paragraph
        - paragraph [ref=f16e445]: Sets the logging level used to log errors and information. The "hide" attribute is optional.
        - generic [ref=f16e446]: <loglevel hide="attribute">options</loglevel>
        - table [ref=f16e447]:
          - rowgroup [ref=f16e448]:
            - row "Attribute [Expand] Action" [ref=f16e449]:
              - columnheader "Attribute" [ref=f16e450]
              - columnheader "[Expand] Action" [ref=f16e451]
        - table [ref=f16e452]:
