            - text: Optional - SSL setting for MySQL
            - link "[5]" [ref=f16e1069] [cursor=pointer]:
              - /url: https://web.archive.org/web/20240101191552/https://github.com/xbmc/xbmc/pull/2566
        - generic [ref=f16e1070]:
          - term [ref=f16e1071]: <ciphers>
